<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALI — Product Intelligence</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-void: #060910;
        --bg-deep: #0b0f1c;
        --bg-surface: #131830;
        --bg-card: #1a2040;
        --bg-card-hover: #222a50;
        --bg-elevated: #2a3460;

        --text-bright: #f0f2f8;
        --text-primary: #c0c6d8;
        --text-secondary: #7a829a;
        --text-muted: #4a5068;

        --gold: #c9a84c;
        --gold-soft: rgba(201, 168, 76, 0.12);
        --gold-glow: rgba(201, 168, 76, 0.25);
        --blue: #5b8def;

        --critical: #ef4444;
        --critical-bg: rgba(239, 68, 68, 0.08);
        --high: #f97316;
        --high-bg: rgba(249, 115, 22, 0.08);
        --medium: #eab308;
        --medium-bg: rgba(234, 179, 8, 0.08);
        --low: #6b7280;
        --low-bg: rgba(107, 114, 128, 0.08);

        --cat-gap: #5b8def;
        --cat-tofu: #10b981;
        --cat-enterprise: #a855f7;
        --cat-beyond: #ec4899;
        --cat-icp: #f59e0b;
        --cat-micro: #6366f1;

        --icp-a1: #5b8def;
        --icp-a2: #a855f7;
        --icp-a3: #10b981;
        --icp-a4: #f59e0b;

        --max-w: 960px;
        --r: 14px;
        --r-sm: 10px;
      }

      html {
        background: var(--bg-void);
        color: var(--text-primary);
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 17px;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
      }
      body {
        min-height: 100vh;
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: "Fraunces", Georgia, serif;
        color: var(--text-bright);
        font-weight: 500;
        line-height: 1.25;
      }

      /* ── GRAIN ── */
      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
        opacity: 0.5;
      }

      /* ── HEADER ── */
      header {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 56px 24px 0;
      }
      header h1 {
        font-size: 2.2rem;
        letter-spacing: -0.03em;
        margin-bottom: 6px;
      }
      header .subtitle {
        font-size: 0.92rem;
        color: var(--text-secondary);
        font-weight: 300;
      }
      header .gold-rule {
        height: 2px;
        background: linear-gradient(90deg, var(--gold), transparent 60%);
        margin-top: 20px;
        opacity: 0.5;
      }

      /* ── TABS ── */
      .tabs {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 28px 24px 0;
        display: flex;
        gap: 4px;
      }
      .tab {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 12px 20px;
        border-radius: var(--r-sm) var(--r-sm) 0 0;
        cursor: pointer;
        transition: all 0.25s;
      }
      .tab:hover {
        color: var(--text-secondary);
        background: var(--bg-surface);
      }
      .tab.active {
        color: var(--gold);
        background: var(--bg-deep);
        border-bottom: 2px solid var(--gold);
      }

      /* ── BACK NAV ── */
      .back-nav {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 20px 24px 0;
      }
      .back-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-family: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: var(--r-sm);
        transition: all 0.2s;
      }
      .back-btn:hover {
        color: var(--gold);
        background: var(--gold-soft);
      }
      .back-btn svg {
        width: 16px;
        height: 16px;
      }

      /* ── MAIN CONTENT ── */
      main {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 12px 24px 80px;
      }

      /* ── VIEW TRANSITIONS ── */
      .view-enter {
        animation: viewIn 0.35s ease-out;
      }
      @keyframes viewIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── SECTION TITLE ── */
      .section-title {
        font-size: 1.5rem;
        margin-bottom: 6px;
      }
      .section-sub {
        font-size: 0.88rem;
        color: var(--text-secondary);
        margin-bottom: 32px;
        font-weight: 300;
      }

      /* ── SEVERITY BAR ── */
      .sev-bar {
        display: flex;
        height: 56px;
        border-radius: var(--r);
        overflow: hidden;
        margin-bottom: 32px;
        cursor: pointer;
      }
      .sev-bar .seg {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: filter 0.2s;
        font-weight: 600;
        font-size: 0.92rem;
        color: rgba(255, 255, 255, 0.9);
      }
      .sev-bar .seg:hover {
        filter: brightness(1.3);
      }
      .sev-bar .seg .count {
        font-family: "Fraunces", serif;
        font-size: 1.4rem;
        font-weight: 700;
      }
      .sev-bar .seg.critical {
        background: var(--critical);
        flex: 11;
      }
      .sev-bar .seg.high {
        background: var(--high);
        flex: 15;
      }
      .sev-bar .seg.medium {
        background: var(--medium);
        flex: 16;
        color: rgba(0, 0, 0, 0.75);
      }
      .sev-bar .seg.low {
        background: var(--low);
        flex: 2;
      }

      /* ── STAT CARDS (severity) ── */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 40px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid transparent;
        border-radius: var(--r);
        padding: 24px;
        cursor: pointer;
        transition: all 0.25s;
        position: relative;
        overflow: hidden;
      }
      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        opacity: 0.7;
      }
      .stat-card.critical::before {
        background: var(--critical);
      }
      .stat-card.high::before {
        background: var(--high);
      }
      .stat-card.medium::before {
        background: var(--medium);
      }
      .stat-card.low::before {
        background: var(--low);
      }
      .stat-card:hover {
        background: var(--bg-card-hover);
        border-color: rgba(255, 255, 255, 0.06);
        transform: translateY(-2px);
      }
      .stat-card .num {
        font-family: "Fraunces", serif;
        font-size: 2.6rem;
        font-weight: 700;
        color: var(--text-bright);
        line-height: 1;
        margin-bottom: 4px;
      }
      .stat-card .label {
        font-size: 0.82rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .stat-card.critical .label {
        color: var(--critical);
      }
      .stat-card.high .label {
        color: var(--high);
      }
      .stat-card.medium .label {
        color: var(--medium);
      }
      .stat-card.low .label {
        color: var(--low);
      }
      .stat-card .note {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 6px;
      }

      /* ── ACTION CARDS ── */
      .actions-section {
        margin-bottom: 48px;
      }
      .actions-section h3 {
        font-size: 1.15rem;
        margin-bottom: 18px;
        color: var(--gold);
      }
      .action-card {
        display: flex;
        gap: 18px;
        padding: 20px 22px;
        background: var(--bg-card);
        border-left: 3px solid var(--gold);
        border-radius: 0 var(--r-sm) var(--r-sm) 0;
        margin-bottom: 10px;
        transition: background 0.2s;
      }
      .action-card:hover {
        background: var(--bg-card-hover);
      }
      .action-num {
        font-family: "Fraunces", serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--gold);
        min-width: 28px;
        line-height: 1.1;
      }
      .action-body h4 {
        font-size: 1rem;
        margin-bottom: 4px;
        font-weight: 500;
      }
      .action-body p {
        font-size: 0.88rem;
        color: var(--text-secondary);
      }

      /* ── OPPORTUNITY CARDS ── */
      .opps-section {
        margin-bottom: 48px;
      }
      .opps-section h3 {
        font-size: 1.15rem;
        margin-bottom: 18px;
        color: var(--cat-tofu);
      }
      .opp-card {
        padding: 20px 22px;
        background: var(--bg-card);
        border-left: 3px solid var(--cat-tofu);
        border-radius: 0 var(--r-sm) var(--r-sm) 0;
        margin-bottom: 10px;
      }
      .opp-card h4 {
        font-size: 1rem;
        margin-bottom: 4px;
        font-weight: 500;
      }
      .opp-card p {
        font-size: 0.88rem;
        color: var(--text-secondary);
      }
      .opp-card .refs {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 6px;
      }

      /* ── FINDING CARDS ── */
      .finding-card {
        background: var(--bg-card);
        border-radius: var(--r);
        margin-bottom: 12px;
        overflow: hidden;
        border: 1px solid transparent;
        transition: border-color 0.2s;
      }
      .finding-card:hover {
        border-color: rgba(255, 255, 255, 0.05);
      }
      .finding-header {
        padding: 22px 24px;
        cursor: pointer;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .finding-header:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .finding-id {
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 600;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }
      .finding-title {
        font-family: "Fraunces", serif;
        font-size: 1.15rem;
        color: var(--text-bright);
        font-weight: 500;
        line-height: 1.35;
        margin-bottom: 10px;
      }
      .finding-meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .finding-chevron {
        color: var(--text-muted);
        transition: transform 0.25s;
        flex-shrink: 0;
        margin-top: 4px;
      }
      .finding-card.expanded .finding-chevron {
        transform: rotate(180deg);
      }

      .finding-detail {
        padding: 0 24px 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        display: none;
      }
      .finding-card.expanded .finding-detail {
        display: block;
        animation: detailIn 0.3s ease-out;
      }
      @keyframes detailIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .detail-section {
        margin-top: 20px;
      }
      .detail-label {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
      .detail-text {
        font-size: 0.92rem;
        line-height: 1.7;
      }

      .quote-block {
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--r-sm);
        padding: 14px 18px;
        margin-bottom: 8px;
      }
      .quote-icp {
        font-size: 0.78rem;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .quote-text {
        font-size: 0.88rem;
        font-style: italic;
        color: var(--text-secondary);
      }

      .fix-block {
        background: var(--gold-soft);
        border-radius: var(--r-sm);
        padding: 16px 20px;
        border-left: 3px solid var(--gold);
      }
      .fix-block .detail-label {
        color: var(--gold);
      }
      .fix-block p {
        font-size: 0.92rem;
        color: var(--text-primary);
      }

      /* ── CEO RESPONSE ── */
      .ceo-response {
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--r-sm);
        padding: 18px 20px;
        margin-top: 16px;
        border-left: 3px solid var(--text-muted);
      }
      .ceo-response .detail-label {
        color: var(--text-secondary);
        margin-bottom: 10px;
      }
      .ceo-response-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .badge-position {
        display: inline-block;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 100px;
        color: #fff;
      }
      .badge-position.agrees {
        background: #10b981;
      }
      .badge-position.partially_agrees {
        background: #eab308;
        color: rgba(0, 0, 0, 0.7);
      }
      .badge-position.reframes {
        background: #f97316;
      }
      .badge-position.disagrees {
        background: #ef4444;
      }
      .badge-position.defers {
        background: #5b8def;
      }
      .badge-position.nuclear {
        background: #a855f7;
      }
      .ceo-response-text {
        font-size: 0.9rem;
        color: var(--text-primary);
        line-height: 1.65;
        margin-bottom: 8px;
      }
      .new-info-box {
        background: rgba(91, 141, 239, 0.08);
        border-left: 3px solid var(--blue);
        border-radius: 0 var(--r-sm) var(--r-sm) 0;
        padding: 12px 16px;
        margin-top: 10px;
      }
      .new-info-box .detail-label {
        color: var(--blue);
        margin-bottom: 4px;
      }
      .new-info-box p {
        font-size: 0.86rem;
        color: var(--text-secondary);
      }
      .ceo-action-box {
        background: rgba(16, 185, 129, 0.08);
        border-left: 3px solid #10b981;
        border-radius: 0 var(--r-sm) var(--r-sm) 0;
        padding: 12px 16px;
        margin-top: 10px;
      }
      .ceo-action-box .detail-label {
        color: #10b981;
        margin-bottom: 4px;
      }
      .ceo-action-box p {
        font-size: 0.86rem;
        color: var(--text-secondary);
      }

      /* ── BADGES ── */
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 100px;
      }
      .badge-sev {
        color: rgba(255, 255, 255, 0.9);
      }
      .badge-sev.critical {
        background: var(--critical);
      }
      .badge-sev.high {
        background: var(--high);
      }
      .badge-sev.medium {
        background: var(--medium);
        color: rgba(0, 0, 0, 0.7);
      }
      .badge-sev.low {
        background: var(--low);
      }

      .badge-icp {
        border: 1px solid;
        background: transparent;
      }
      .badge-icp.a1 {
        color: var(--icp-a1);
        border-color: rgba(91, 141, 239, 0.3);
      }
      .badge-icp.a2 {
        color: var(--icp-a2);
        border-color: rgba(168, 85, 247, 0.3);
      }
      .badge-icp.a3 {
        color: var(--icp-a3);
        border-color: rgba(16, 185, 129, 0.3);
      }
      .badge-icp.a4 {
        color: var(--icp-a4);
        border-color: rgba(245, 158, 11, 0.3);
      }

      .badge-cat {
        color: #fff;
      }
      .badge-cat.gap {
        background: var(--cat-gap);
      }
      .badge-cat.tofu {
        background: var(--cat-tofu);
      }
      .badge-cat.enterprise {
        background: var(--cat-enterprise);
      }
      .badge-cat.beyond {
        background: var(--cat-beyond);
      }
      .badge-cat.icp {
        background: var(--cat-icp);
        color: rgba(0, 0, 0, 0.7);
      }
      .badge-cat.micro {
        background: var(--cat-micro);
      }

      /* ── CATEGORY CARDS (brainstorm) ── */
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 40px;
      }
      .cat-card {
        background: var(--bg-card);
        border-radius: var(--r);
        padding: 28px 24px;
        cursor: pointer;
        transition: all 0.25s;
        position: relative;
        overflow: hidden;
        border: 1px solid transparent;
      }
      .cat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .cat-card.gap::before {
        background: var(--cat-gap);
      }
      .cat-card.tofu::before {
        background: var(--cat-tofu);
      }
      .cat-card.enterprise::before {
        background: var(--cat-enterprise);
      }
      .cat-card.beyond::before {
        background: var(--cat-beyond);
      }
      .cat-card.icp::before {
        background: var(--cat-icp);
      }
      .cat-card.micro::before {
        background: var(--cat-micro);
      }
      .cat-card:hover {
        background: var(--bg-card-hover);
        border-color: rgba(255, 255, 255, 0.06);
        transform: translateY(-2px);
      }
      .cat-card .cat-count {
        font-family: "Fraunces", serif;
        font-size: 2.2rem;
        font-weight: 700;
        color: var(--text-bright);
        line-height: 1;
        margin-bottom: 6px;
      }
      .cat-card .cat-name {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--text-bright);
        margin-bottom: 4px;
      }
      .cat-card .cat-desc {
        font-size: 0.8rem;
        color: var(--text-secondary);
      }

      /* ── PRODUCT CARDS ── */
      .product-card {
        background: var(--bg-card);
        border-radius: var(--r);
        margin-bottom: 12px;
        overflow: hidden;
        border: 1px solid transparent;
        transition: border-color 0.2s;
      }
      .product-card:hover {
        border-color: rgba(255, 255, 255, 0.05);
      }
      .product-card.top-pick {
        border-left: 3px solid var(--gold);
      }
      .product-header {
        padding: 22px 24px;
        cursor: pointer;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .product-header:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .product-num {
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 4px;
      }
      .product-name {
        font-family: "Fraunces", serif;
        font-size: 1.15rem;
        color: var(--text-bright);
        font-weight: 500;
        line-height: 1.35;
        margin-bottom: 6px;
      }
      .product-vp {
        font-size: 0.88rem;
        color: var(--text-secondary);
        font-style: italic;
        margin-bottom: 10px;
      }
      .product-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .product-meta .meta-tag {
        font-size: 0.75rem;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.05);
        padding: 3px 10px;
        border-radius: 100px;
      }
      .top-pick-badge {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--gold);
        background: var(--gold-soft);
        padding: 3px 10px;
        border-radius: 100px;
        letter-spacing: 0.04em;
      }

      .product-detail {
        padding: 0 24px 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        display: none;
      }
      .product-card.expanded .product-detail {
        display: block;
        animation: detailIn 0.3s ease-out;
      }
      .product-detail ul {
        padding-left: 18px;
        margin-top: 4px;
      }
      .product-detail li {
        font-size: 0.88rem;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }
      .product-detail .detail-text {
        font-size: 0.88rem;
        color: var(--text-secondary);
      }

      /* ── TOP PICKS SECTION ── */
      .picks-section {
        margin-bottom: 48px;
      }
      .picks-section h3 {
        font-size: 1.15rem;
        margin-bottom: 18px;
        color: var(--gold);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        html {
          font-size: 16px;
        }
        header {

          '<div class="stat-grid">' +
          '<div class="stat-card critical" onclick="drillSeverity(\'critical\')"><div class="num">11</div><div class="label">Critical</div><div class="note">Consensus issues across multiple ICPs</div></div>' +
          '<div class="stat-card high" onclick="drillSeverity(\'high\')"><div class="num">15</div><div class="label">High</div><div class="note">Significant gaps requiring attention</div></div>' +
          '<div class="stat-card medium" onclick="drillSeverity(\'medium\')"><div class="num">16</div><div class="label">Medium</div><div class="note">Important but not blocking</div></div>' +
          '<div class="stat-card low" onclick="drillSeverity(\'low\')"><div class="num">2</div><div class="label">Low</div><div class="note">Minor framing concerns</div></div>' +
          "</div>" +
          '<div class="actions-section"><h3>Top 5 Priority Actions</h3>' +
          TOP_ACTIONS.map(function (a, i) {
            return (
              '<div class="action-card"><div class="action-num">' +
              (i + 1) +
              '</div><div class="action-body"><h4>' +
              a.title +
              "</h4><p>" +
              a.desc +
              "</p></div></div>"
            );
          }).join("") +
          "</div>" +
          '<div class="opps-section"><h3>Opportunities Identified</h3>' +
          OPPORTUNITIES.map(function (o) {
            return (
              '<div class="opp-card"><h4>' +
              o.title +
              "</h4><p>" +
              o.desc +
              '</p><div class="refs">' +
              o.refs +
              "</div></div>"
            );
          }).join("") +
          "</div>" +
          "</div>"
        );
      }

      const POSITION_LABELS = {
        agrees: "Agrees",
        partially_agrees: "Partially Agrees",
        disagrees: "Disagrees",
        reframes: "Reframes",
        defers: "Defers",
        nuclear: "Nuclear",
      };

      function renderNishResponse(nish) {
        if (!nish) return "";
        var html =
          '<div class="detail-section"><div class="ceo-response">' +
          '<div class="detail-label">CEO Response</div>' +
          '<div class="ceo-response-header">' +
          '<span class="badge-position ' +
          nish.position +
          '">' +
          POSITION_LABELS[nish.position] +
          "</span>" +
          "</div>" +
          '<div class="ceo-response-text">' +
          nish.response +
          "</div>";
        if (nish.new_info) {
          html +=
            '<div class="new-info-box"><div class="detail-label">New Information</div><p>' +
            nish.new_info +
            "</p></div>";
        }
        if (nish.action) {
          html +=
            '<div class="ceo-action-box"><div class="detail-label">Updated Action</div><p>' +
            nish.action +
            "</p></div>";
        }
        html += "</div></div>";
        return html;
      }

      function icpClass(icp) {
        if (icp.indexOf("Team Leader") >= 0) return "a1";
        if (icp.indexOf("AI Enablement") >= 0 || icp.indexOf("Enablement") >= 0)
          return "a2";
        if (icp.indexOf("COO") >= 0) return "a3";
        if (icp.indexOf("CFO") >= 0) return "a4";
        return "a1";
      }

      function renderRTCategory() {
        var sev = state.category;
        var sevLabel = {
          critical: "Critical",
          high: "High",
          medium: "Medium",
          low: "Low",
        }[sev];
        var items;

        if (sev === "critical") {
          items = CRITICAL.map(function (f) {
            return (
              '<div class="finding-card" id="f-' +
              f.id +
              '">' +
              '<div class="finding-header" onclick="toggleFinding(' +
              f.id +
              ')">' +
              "<div>" +
              '<div class="finding-id">#' +
              f.id +
              " &middot; " +
              f.refs +
              "</div>" +
              '<div class="finding-title">' +
              f.title +
              "</div>" +
              '<div class="finding-meta">' +
              '<span class="badge badge-sev critical">Critical</span>' +
              f.agents
                .map(function (a) {
                  return (
                    '<span class="badge badge-icp ' +
                    a +
                    '">' +
                    AGENTS[a].label +
                    "</span>"
                  );
                })
                .join("") +
              (f.nish
                ? '<span class="badge-position ' +
                  f.nish.position +
                  '">' +
                  POSITION_LABELS[f.nish.position] +
                  "</span>"
                : "") +
              "</div>" +
              "</div>" +
              '<svg class="finding-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>' +
              "</div>" +
              '<div class="finding-detail">' +
              '<div class="detail-section"><div class="detail-label">Problem</div><div class="detail-text">' +
              f.problem +
              "</div></div>" +
              '<div class="detail-section"><div class="detail-label">ICP Quotes</div>' +
              f.quotes
                .map(function (q) {
                  return (
                    '<div class="quote-block"><div class="quote-icp" style="color:var(--icp-' +
                    icpClass(q.icp) +
                    ')">' +
                    q.icp +
                    '</div><div class="quote-text">\u201c' +
                    q.text +
                    "\u201d</div></div>"
                  );
                })
                .join("") +
              "</div>" +
              '<div class="detail-section"><div class="fix-block"><div class="detail-label">Recommended Fix</div><p>' +
              f.fix +
              "</p></div></div>" +
              renderNishResponse(f.nish) +
              "</div>" +
              "</div>"
            );
          }).join("");
        } else {
          var data = sev === "high" ? HIGH : sev === "medium" ? MEDIUM : LOW;
          items = data
            .map(function (f, i) {
              var hasDetail = !!f.issue || !!f.nish;
              return (
                '<div class="finding-card" id="f-' +
                sev +
                "-" +
                i +
                '">' +
                '<div class="finding-header" onclick="toggleSimpleFinding(\'' +
                sev +
                "-" +
                i +
                "')\">" +
                "<div>" +
                '<div class="finding-id">' +
                f.id +
                "</div>" +
                '<div class="finding-title">' +
                f.title +
                "</div>" +
                '<div class="finding-meta">' +
                '<span class="badge badge-sev ' +
                sev +
                '">' +
                sevLabel +
                "</span>" +
                '<span class="badge badge-icp ' +
                icpClass(f.icp) +
                '">' +
                f.icp +
                "</span>" +
                (f.nish
                  ? '<span class="badge-position ' +
                    f.nish.position +
                    '">' +
                    POSITION_LABELS[f.nish.position] +
                    "</span>"
                  : "") +
                "</div>" +
                "</div>" +
                (hasDetail
                  ? '<svg class="finding-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>'
                  : "") +
                "</div>" +
                (hasDetail
                  ? '<div class="finding-detail">' +
                    (f.issue
                      ? '<div class="detail-section"><div class="detail-label">Core Issue</div><div class="detail-text">' +
                        f.issue +
                        "</div></div>"
                      : "") +
                    renderNishResponse(f.nish) +
                    "</div>"
                  : "") +
                "</div>"
              );
            })
            .join("");
        }

        var count =
          sev === "critical"
            ? 11
            : sev === "high"
              ? 15
              : sev === "medium"
                ? 16
                : 2;
        return (
          '<div class="view-enter">' +
          '<h2 class="section-title">' +
          sevLabel +
          " Findings</h2>" +
          '<p class="section-sub">' +
          count +
          " findings at this severity level</p>" +
          items +
          "</div>"
        );
      }

      function renderBSDashboard() {
        var catCounts = {};
        Object.keys(CATEGORIES).forEach(function (k) {
          catCounts[k] = PRODUCTS.filter(function (p) {
            return p.cat === k;
          }).length;
        });
        var topPicks = PRODUCTS.filter(function (p) {
          return p.topPick;
        });

        return (
          '<div class="view-enter">' +
          '<h2 class="section-title">Product Suite Expansion</h2>' +
          '<p class="section-sub">20 concepts across 6 categories</p>' +
          '<div class="cat-grid">' +
          Object.keys(CATEGORIES)
            .map(function (k) {
              var v = CATEGORIES[k];
              return (
                '<div class="cat-card ' +
                v.color +
                '" onclick="drillCategory(\'' +
                k +
                "')\">" +
                '<div class="cat-count">' +
                catCounts[k] +
                "</div>" +
                '<div class="cat-name">' +
                v.label +
                "</div>" +
                '<div class="cat-desc">' +
                v.desc +
                "</div>" +
                "</div>"
              );
            })
            .join("") +
          "</div>" +
          '<div class="picks-section"><h3>Highest-Leverage Additions</h3>' +
          topPicks
            .map(function (p) {
              return (
                '<div class="product-card top-pick" id="p-top-' +
                p.num +
                '">' +
                '<div class="product-header" onclick="toggleProduct(\'top-' +
                p.num +
                "')\">" +
                "<div>" +
                '<div class="product-num">#' +
                p.num +
                " &middot; " +
                CATEGORIES[p.cat].label +
                "</div>" +
                '<div class="product-name">' +
                p.name +
                "</div>" +
                '<div class="product-vp">' +
                p.vp +
                "</div>" +
                '<div class="product-meta">' +
                '<span class="top-pick-badge">TOP PICK</span>' +
                '<span class="meta-tag">' +
                p.icp +
                "</span>" +
                '<span class="meta-tag">' +
                p.effort +
                "</span>" +
                "</div>" +
                "</div>" +
                '<svg class="finding-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>' +
                "</div>" +
                '<div class="finding-detail">' +
                renderProductDetail(p) +
                "</div>" +
                "</div>"
              );
            })
            .join("") +
          "</div>" +
          "</div>"
        );
      }

      function renderBSCategory() {
        var cat = state.category;
        var info = CATEGORIES[cat];
        var products = PRODUCTS.filter(function (p) {
          return p.cat === cat;
        });

        return (
          '<div class="view-enter">' +
          '<h2 class="section-title">' +
          info.label +
          "</h2>" +
          '<p class="section-sub">' +
          info.desc +
          " &middot; " +
          products.length +
          " concepts</p>" +
          products
            .map(function (p) {
              return (
                '<div class="product-card ' +
                (p.topPick ? "top-pick" : "") +
                '" id="p-cat-' +
                p.num +
                '">' +
                '<div class="product-header" onclick="toggleProduct(\'cat-' +
                p.num +
                "')\">" +
                "<div>" +
                '<div class="product-num">#' +
                p.num +
                "</div>" +
                '<div class="product-name">' +
                p.name +
                "</div>" +
                '<div class="product-vp">' +
                p.vp +
                "</div>" +
                '<div class="product-meta">' +
                (p.topPick
                  ? '<span class="top-pick-badge">TOP PICK</span>'
                  : "") +
                '<span class="badge badge-cat ' +
                info.color +
                '">' +
                info.label +
                "</span>" +
                '<span class="meta-tag">' +
                p.icp +
                "</span>" +
                '<span class="meta-tag">' +
                p.effort +
                "</span>" +
                '<span class="meta-tag">' +
                p.complexity +
                "</span>" +
                "</div>" +
                "</div>" +
                '<svg class="finding-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>' +
                "</div>" +
                '<div class="finding-detail">' +
                renderProductDetail(p) +
                "</div>" +
                "</div>"
              );
            })
            .join("") +
          "</div>"
        );
      }

      function renderProductDetail(p) {
        return (
          '<div class="detail-section"><div class="detail-label">Pain it solves</div><div class="detail-text">' +
          p.pain +
          "</div></div>" +
          '<div class="detail-section"><div class="detail-label">What it does</div><ul>' +
          p.does
            .map(function (d) {
              return "<li>" + d + "</li>";
            })
            .join("") +
          "</ul></div>" +
          '<div class="detail-section"><div class="detail-label">Context dividend</div><div class="detail-text">' +
          p.context +
          "</div></div>" +
          '<div class="detail-section"><div class="fix-block" style="border-left-color:var(--cat-' +
          p.cat +
          ')"><div class="detail-label" style="color:var(--cat-' +
          p.cat +
          ')">Cross-sell hook</div><p>' +
          p.cross +
          "</p></div></div>"
        );
      }

      // ────────────────────────────────────────────
      // INTERACTIONS
      // ────────────────────────────────────────────

      function drillSeverity(sev) {
        state.view = "category";
        state.category = sev;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function drillCategory(cat) {
        state.view = "category";
        state.category = cat;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function goBack() {
        state.view = "dashboard";
        state.category = null;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function toggleFinding(id) {
        document.getElementById("f-" + id).classList.toggle("expanded");
      }

      function toggleSimpleFinding(id) {
        var el = document.getElementById("f-" + id);
        if (el.querySelector(".finding-detail"))
          el.classList.toggle("expanded");
      }

      function toggleProduct(id) {
        document.getElementById("p-" + id).classList.toggle("expanded");
      }

      // Tab switching
      document.querySelectorAll(".tab").forEach(function (tab) {
        tab.addEventListener("click", function () {
          document.querySelectorAll(".tab").forEach(function (t) {
            t.classList.remove("active");
          });
          tab.classList.add("active");
          state.tab = tab.dataset.tab;
          state.view = "dashboard";
          state.category = null;
          render();
        });
      });

      // Initial render
      render();
    </script>
  </body>
</html>
